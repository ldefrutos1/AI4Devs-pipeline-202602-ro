name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_BACKEND_PATH: ${{ secrets.EC2_BACKEND_PATH }}
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "EC2_BACKEND_PATH='$EC2_BACKEND_PATH' bash -s" <<'EOF'
            set -e

            cd "$EC2_BACKEND_PATH"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            npm ci
            npm run prisma:generate
            npx prisma migrate deploy
            npm run build

            pm2 restart lti-backend || pm2 start dist/index.js --name lti-backend
            pm2 save
          EOF
