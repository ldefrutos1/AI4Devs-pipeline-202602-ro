name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm exec -- prettier --check "src/**/*.ts"

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm exec -- eslint src --ext .js,.jsx,.ts,.tsx

      - name: Run tests
        run: npm exec -- react-scripts test --watchAll=false --passWithNoTests

      - name: Build frontend
        run: npm run build
